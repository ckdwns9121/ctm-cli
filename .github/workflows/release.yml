name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Auto Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 태그 이력 필요

      - name: Compute next patch version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "▶ Next version: $NEXT"

      - name: Create and push tag
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build macOS binaries
        run: |
          VERSION_NUM="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION_NUM#v}"
          mkdir -p dist/release
          bun build --compile --target=bun-macos-arm64 --minify src/index.ts \
            --define __PKG_VERSION__="'${VERSION_NUM}'" \
            --outfile dist/release/ctm-macos-arm64
          bun build --compile --target=bun-macos-x64 --minify src/index.ts \
            --define __PKG_VERSION__="'${VERSION_NUM}'" \
            --outfile dist/release/ctm-macos-x64
          chmod +x dist/release/ctm-macos-arm64
          chmod +x dist/release/ctm-macos-x64

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 dist/release/ctm-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x64=$(shasum -a 256 dist/release/ctm-macos-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/release/ctm-macos-arm64
            dist/release/ctm-macos-x64
          generate_release_notes: true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          VERSION_NUM="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION_NUM#v}"
          npm version "$VERSION_NUM" --no-git-tag-version
          npx tsup
          npm publish --access public

      - name: Update Homebrew tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.tag }}
          SHA256_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA256_X64: ${{ steps.sha.outputs.x64 }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
            exit 0
          fi

          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/homebrew-ctm.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          VERSION_NUM="${VERSION#v}"

          {
            echo 'class Ctm < Formula'
            echo '  desc "Colo Ticket Manager — Jira-driven branch management CLI"'
            echo "  homepage \"https://github.com/${REPO}\""
            echo "  version \"${VERSION_NUM}\""
            echo ''
            echo '  on_macos do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"https://github.com/${REPO}/releases/download/${VERSION}/ctm-macos-arm64\""
            echo "      sha256 \"${SHA256_ARM64}\""
            echo '    else'
            echo "      url \"https://github.com/${REPO}/releases/download/${VERSION}/ctm-macos-x64\""
            echo "      sha256 \"${SHA256_X64}\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    if Hardware::CPU.arm?'
            echo '      bin.install "ctm-macos-arm64" => "ctm"'
            echo '    else'
            echo '      bin.install "ctm-macos-x64" => "ctm"'
            echo '    end'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    system "#{bin}/ctm", "--version"'
            echo '  end'
            echo 'end'
          } > /tmp/tap/Formula/ctm.rb

          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/ctm.rb
          git diff --staged --quiet || git commit -m "chore: bump ctm to ${VERSION}"
          git push
